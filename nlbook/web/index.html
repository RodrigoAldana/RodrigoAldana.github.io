<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lyapunov Interactive</title>

<style>
#resizer{
  background:var(--border);
  cursor:col-resize;
  border-radius:6px;
}
#resizer:hover{
  background:var(--accent);
}
:root{
  --bg:#0b0f14;
  --panel:#0f1620;
  --text:#e7edf6;
  --muted:#a9b6c7;
  --accent:#ffd37a;
  --accent2:#fff4c2;
  --border:#1e2a3a;
}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui}
.app{height:100%;display:grid;grid-template-columns:1.14fr 6px 0.86fr;gap:12px;padding:12px;box-sizing:border-box}
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.body{padding:14px;overflow:auto;line-height:1.5}
.tag{color:var(--muted);font-size:12px}

.selectable{cursor:pointer;border-radius:10px;padding:2px 4px;transition:120ms;background:rgba(255,211,122,.16);color:#fff}
.selectable:hover{background:rgba(255,211,122,.16);color:#fff}
.selectable.active{background:rgba(255,244,194,.20);color:#fff}

#panelErr{display:none;margin-top:10px;padding:10px;border-radius:12px;border:1px solid rgba(255,211,122,.55);background:rgba(255,211,122,.10);white-space:pre-wrap;font-size:12px}
</style>

<script>
window.MathJax = {
  tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['\\[','\\]']] },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
};
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>

<body>
<div class="app">

<section class="card" id="leftPanel">
  <div class="head">
    <div>Source</div>
    <div class="tag" id="srcTag">build/main.html</div>
  </div>
  <div class="body" id="source"></div>
</section>
<div id="resizer"></div>
<aside class="card" id="rightPanel">
  <div class="head">
    <div>Expansion</div>
    <div class="tag" id="panelTag">none</div>
  </div>
  <div class="body" id="panel">
    Click a highlighted anchor in the source.
    <div id="panelErr"></div>
  </div>
</aside>

</div>

<script type="module" src="./app.js"></script>
</body>
</html>
